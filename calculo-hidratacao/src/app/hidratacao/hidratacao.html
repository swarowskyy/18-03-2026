<h1>Calculando sua Hidratação!🫗
<input type="number" [(ngModel)]="peso" placeholder="Peso (Kg)" required>
<input type="text" [(ngModel)]="atividade" placeholder="Sedentário, Moderado, Intenso">
<button (click)="calcularIMC()">Calcular</button>
<div *ngIf="hidratação > 0">
  <p>você deve ingerir:{{conclusao | number:`1.1-1` }}</p>
  <p>Situação:<strong>{{ resultado }}</strong></p>
</div>
